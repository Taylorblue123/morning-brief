<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona · Morning Brief</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧠%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/style.css">
<script>(function(){const s=localStorage.getItem("morningbrief.theme");if(s)document.documentElement.setAttribute("data-theme",s);})();</script>
<style>
  .persona-hero { max-width: 820px; margin: 0 auto 32px; }
  .persona-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; font-size: 13px; color: var(--text-3); font-family: var(--font-mono); }
  .persona-body { max-width: 820px; margin: 0 auto; padding-bottom: 80px; }

  .cat-group { margin-bottom: 28px; }
  .cat-heading {
    font-family: var(--font-display); font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3);
    margin-bottom: 10px; padding-left: 2px;
  }

  .claim-card {
    background: var(--bg-alt); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-card); padding: 16px 20px; margin: 8px 0;
    transition: border-color 0.2s, opacity 0.2s;
  }
  .claim-card.refuted {
    border-color: var(--rose); opacity: 0.65;
  }
  .claim-card.refuted .claim-text { text-decoration: line-through; }

  .claim-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .claim-id { font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.06em; }
  .claim-badge {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 2px 8px; border-radius: var(--radius-pill);
    background: var(--accent-soft); color: var(--accent); font-family: var(--font-mono);
  }
  .claim-badge.preference { background: rgba(16,185,129,0.10); color: var(--emerald); }
  .claim-badge.working-style { background: rgba(184,122,0,0.10); color: var(--amber); }
  .claim-badge.project { background: var(--accent-soft); color: var(--accent); }
  .claim-badge.knowledge { background: rgba(192,38,211,0.10); color: var(--rose); }
  .claim-badge.recent-state { background: rgba(29,140,58,0.10); color: var(--green); }

  .claim-text { font-family: var(--font-display); font-size: 15px; font-weight: 510; color: var(--text); line-height: 1.45; margin-bottom: 10px; }

  .claim-stats { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-3); flex-wrap: wrap; }
  .confidence-bar-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  .confidence-bar {
    width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .confidence-fill {
    height: 100%; border-radius: 3px; background: var(--accent);
    transition: width 0.3s;
  }
  .confidence-val { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text-2); }

  .refute-btn {
    margin-left: auto; padding: 4px 12px; border-radius: var(--radius-pill);
    border: 1px solid var(--border); background: transparent; color: var(--text-3);
    font-size: 11px; cursor: pointer; font-family: var(--font-body); transition: all 0.15s;
  }
  .refute-btn:hover { border-color: var(--rose); color: var(--rose); }
  .claim-card.refuted .refute-btn { background: var(--rose); color: #fff; border-color: var(--rose); }

  /* Sticky submit bar */
  .sticky-submit {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg); border-top: 2px solid var(--rose);
    padding: 14px 20px; display: none; align-items: center; justify-content: center; gap: 14px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
    animation: slideUp 0.25s ease-out;
  }
  .sticky-submit.visible { display: flex; }
  .sticky-submit .pick-count { font-size: 14px; font-weight: 600; color: var(--text); }
  .sticky-submit .pick-count span { color: var(--rose); }
  .fb-btn { padding: 8px 20px; border-radius: var(--radius-pill); border: 1px solid var(--accent); background: var(--accent); color: #fff; font-family: var(--font-body); font-size: 14px; font-weight: 510; cursor: pointer; transition: all 0.15s; }
  .fb-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .fb-btn.ghost { background: transparent; color: var(--accent); }
  .fb-btn.ghost:hover { background: var(--accent); color: #fff; }
  .fb-btn.primary { background: var(--rose); border-color: var(--rose); }
  .fb-btn.primary:hover { filter: brightness(1.1); }
  .status-msg { font-size: 13px; color: var(--text-3); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a class="date-line" href="./index.html" style="text-decoration:none">← morning brief</a>
    <div class="stamp"><button class="theme-toggle" onclick="(function(){const c=document.documentElement.getAttribute('data-theme');const os=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';const n=c?(c==='dark'?'light':'dark'):(os==='dark'?'light':'dark');document.documentElement.setAttribute('data-theme',n);localStorage.setItem('morningbrief.theme',n);})()">◑ theme</button></div>
  </div>

  <div class="persona-hero">
    <h1>🧠 Persona Claims</h1>
    <div style="font-size:17px;color:var(--text-3);margin-top:8px;line-height:1.5;">
      What Hermes believes about you. Mark anything wrong — refutations feed back into the next distillation.
    </div>
    <div class="persona-meta">
      <span id="claim-count">— claims</span>
      <span>·</span>
      <span id="last-distilled">last distilled: —</span>
    </div>
  </div>

  <div class="persona-body" id="claims-body">
    <div class="loading">loading persona…</div>
  </div>
</div>

<!-- Sticky submit bar -->
<div class="sticky-submit" id="sticky-bar">
  <div class="pick-count"><span id="refute-num">0</span> refutation(s)</div>
  <button class="fb-btn primary" id="sticky-submit-gh">📮 Submit via GitHub Issue</button>
  <button class="fb-btn ghost" id="sticky-clear">✕ Clear</button>
  <div class="status-msg" id="sticky-status"></div>
</div>

<script>
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const REFUTE_KEY = "morningbrief.persona-refutations";
const CATEGORIES = ["preference", "working-style", "project", "knowledge", "recent-state"];
const CAT_LABELS = { "preference": "🎯 Preferences", "working-style": "⚙️ Working Style", "project": "📦 Projects", "knowledge": "📚 Knowledge", "recent-state": "🕑 Recent State" };

function loadRefutations() { try { return JSON.parse(localStorage.getItem(REFUTE_KEY) || "{}"); } catch(e) { return {}; } }
function saveRefutations(r) { localStorage.setItem(REFUTE_KEY, JSON.stringify(r)); updateStickyBar(); }

function updateStickyBar() {
  const refs = loadRefutations();
  const count = Object.keys(refs).length;
  document.getElementById("refute-num").textContent = count;
  document.getElementById("sticky-bar").classList.toggle("visible", count > 0);
}

function toggleRefute(id, text) {
  const refs = loadRefutations();
  const card = document.querySelector(`.claim-card[data-id="${id}"]`);
  if (refs[id]) {
    delete refs[id];
    card?.classList.remove("refuted");
  } else {
    refs[id] = text;
    card?.classList.add("refuted");
  }
  saveRefutations(refs);
}

function openGitHubIssue() {
  const refs = loadRefutations();
  const ids = Object.keys(refs);
  if (!ids.length) return;
  const lines = ["## Persona Refutations", ""];
  ids.forEach(id => lines.push(`- **${id}**: ~~${refs[id]}~~`));
  lines.push("", "---", `_Submitted from persona page at ${new Date().toISOString()}_`);
  const body = lines.join("\n");
  const title = `persona-refutation: ${ids.length} claim(s) — ${new Date().toISOString().slice(0,16).replace("T"," ")}`;
  const url = `https://github.com/Taylorblue123/morning-brief/issues/new?labels=persona-refutation&title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}`;
  window.open(url, "_blank", "noopener");
}

async function render() {
  const body = document.getElementById("claims-body");
  try {
    const r = await fetch(`./data/persona-claims.json?t=${Date.now()}`, { cache: "no-store" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const claims = data.claims || [];
    const refs = loadRefutations();

    document.getElementById("claim-count").textContent = `${claims.length} claims`;
    document.getElementById("last-distilled").textContent = `last distilled: ${data.last_distilled ? new Date(data.last_distilled).toLocaleString() : "—"}`;

    // Group by category
    const grouped = {};
    CATEGORIES.forEach(c => grouped[c] = []);
    claims.forEach(cl => {
      const cat = CATEGORIES.includes(cl.category) ? cl.category : "preference";
      grouped[cat].push(cl);
    });

    // Sort each group by confidence descending
    Object.values(grouped).forEach(arr => arr.sort((a, b) => (b.confidence || 0) - (a.confidence || 0)));

    let html = "";
    CATEGORIES.forEach(cat => {
      const items = grouped[cat];
      if (!items.length) return;
      html += `<div class="cat-group">`;
      html += `<div class="cat-heading">${CAT_LABELS[cat] || esc(cat)}</div>`;
      items.forEach(cl => {
        const isRefuted = !!refs[cl.id];
        const pct = Math.round((cl.confidence || 0) * 100);
        html += `
          <div class="claim-card${isRefuted ? " refuted" : ""}" data-id="${esc(cl.id)}">
            <div class="claim-top">
              <span class="claim-id">${esc(cl.id)}</span>
              <span class="claim-badge ${esc(cl.category)}">${esc(cl.category)}</span>
            </div>
            <div class="claim-text">${esc(cl.text)}</div>
            <div class="claim-stats">
              <div class="confidence-bar-wrap">
                <div class="confidence-bar"><div class="confidence-fill" style="width:${pct}%"></div></div>
                <span class="confidence-val">${pct}%</span>
              </div>
              <span>${cl.support_count || 0} evidence</span>
              <span>${cl.last_evidence_ts || "—"}</span>
              <button class="refute-btn" onclick="toggleRefute('${esc(cl.id)}', '${esc(cl.text).replace(/'/g, "\\&#39;")}')">${isRefuted ? "✓ undo" : "✕ wrong"}</button>
            </div>
          </div>`;
      });
      html += `</div>`;
    });

    body.innerHTML = html || `<div class="loading" style="padding:40px 20px;">No persona claims yet.</div>`;
    updateStickyBar();
  } catch (e) {
    body.innerHTML = `<div class="loading" style="padding:40px 20px;">Could not load persona: ${esc(e.message)}</div>`;
  }
}

document.getElementById("sticky-submit-gh").addEventListener("click", openGitHubIssue);
document.getElementById("sticky-clear").addEventListener("click", () => {
  if (confirm("Clear all refutations?")) {
    localStorage.removeItem(REFUTE_KEY);
    render();
  }
});

render();
</script>
</body>
</html>
