<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading · Morning Brief</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌅%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/style.css">
<script>
// Theme bootstrap (repeat on every entry page so toggle state is shared)
(function(){const s=localStorage.getItem("morningbrief.theme");if(s==="light"||s==="dark")document.documentElement.setAttribute("data-theme",s);})();
</script>
<style>
  .page-hero { max-width: 820px; margin: 0 auto 40px; }
  .page-back { font-size: 12px; color: var(--text-4); text-decoration: none; font-family: var(--font-mono); display: inline-block; margin-bottom: 16px; }
  .page-back:hover { color: var(--accent); }
  .page-eyebrow { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; font-family: var(--font-mono); }
  .page-title { font-family: var(--font-display); font-size: 44px; font-weight: 600; line-height: 1.1; letter-spacing: -0.024em; color: var(--text); margin-bottom: 14px; }
  .page-subtitle { font-size: 18px; color: var(--text-3); line-height: 1.5; max-width: 680px; }
  .page-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 18px; font-size: 12px; color: var(--text-4); font-family: var(--font-mono); }
  .page-meta span { padding: 3px 10px; border: 1px solid var(--border-subtle); border-radius: var(--radius-pill); background: var(--bg-alt); }
  .page-body { max-width: 820px; margin: 0 auto; }
  .block { margin: 28px 0; }
  .block-prose { font-size: 16px; line-height: 1.65; color: var(--text-2); }
  .block-prose h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.018em; color: var(--text); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle); }
  .block-prose h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--text); margin: 22px 0 10px; letter-spacing: -0.015em; }
  .block-prose p { margin: 10px 0; }
  .block-prose strong { color: var(--text); font-weight: 600; }
  .block-prose a { color: var(--accent); text-decoration: none; }
  .block-prose a:hover { text-decoration: underline; }
  .block-prose ul, .block-prose ol { margin: 8px 0 8px 22px; }
  .block-prose li { margin: 4px 0; }
  .block-prose blockquote { margin: 14px 0; padding: 10px 16px; border-left: 3px solid var(--accent); background: var(--accent-soft); border-radius: 4px; color: var(--text-2); }
  .block-prose code { background: var(--surface); border: 1px solid var(--border-subtle); padding: 1px 6px; border-radius: 4px; font-size: 13px; color: var(--text); }
  .block-prose table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px; }
  .block-prose th, .block-prose td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-subtle); }
  .block-prose th { color: var(--text); font-weight: 600; background: var(--bg-alt); }
  .block-code {
    background: var(--bg-alt);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-small);
    padding: 16px 18px;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-2);
  }
  .block-code .code-lang {
    font-size: 11px; color: var(--text-4);
    text-transform: uppercase; letter-spacing: 0.06em;
    display: block; margin-bottom: 8px;
  }
  .block-callout {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-small);
    padding: 14px 18px;
    font-size: 15px;
    color: var(--text-2);
    line-height: 1.6;
  }
  .block-callout-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; display: block; font-family: var(--font-mono); }
  .block-embed iframe { width: 100%; border: 1px solid var(--border-subtle); border-radius: var(--radius-small); background: var(--bg-alt); }
  .block-checklist { list-style: none; margin: 0; padding: 0; }
  .block-checklist li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; margin: 4px 0;
    background: var(--bg-alt); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-small);
    font-size: 14px; color: var(--text-2); cursor: pointer;
  }
  .block-checklist li.done { opacity: 0.5; text-decoration: line-through; }
  .block-checklist li::before {
    content: "○"; color: var(--text-4); font-size: 18px; line-height: 1;
  }
  .block-checklist li.done::before { content: "●"; color: var(--green); }
  .block-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .block-gallery img { width: 100%; border-radius: var(--radius-small); border: 1px solid var(--border-subtle); }
  .block-quote {
    font-family: var(--font-display);
    font-size: 20px; font-style: italic;
    color: var(--text-2);
    padding: 18px 24px;
    border-left: 3px solid var(--accent);
    line-height: 1.45;
    letter-spacing: -0.01em;
  }
  .block-quote-cite { display: block; font-size: 13px; color: var(--text-4); font-style: normal; margin-top: 8px; font-family: var(--font-mono); }
  @media (max-width: 720px) {
    .page-title { font-size: 32px; }
    .page-subtitle { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div id="content"><div class="loading">loading…</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="./assets/page-render.js"></script>
</body>
</html>
