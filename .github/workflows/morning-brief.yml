name: morning-brief

on:
  schedule:
    # 23:15 UTC == 07:15 Asia/Shanghai — safety net if laptop was asleep at 07:00 local
    - cron: "15 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if today's brief exists
        id: check
        run: |
          DATE=$(TZ=Asia/Shanghai date +%F)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          if [ -f "data/${DATE}.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Regenerate index (always, idempotent)
        run: |
          python3 scripts/generate.py --from "data/${{ steps.check.outputs.date }}.json" 2>/dev/null || \
          python3 scripts/index_proposals.py || true

      - name: Commit if anything changed
        run: |
          git config user.name "morning-brief-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ci: regenerate indexes"
            git push
          fi
